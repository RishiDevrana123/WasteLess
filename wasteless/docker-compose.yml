version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: wasteless-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: wasteless
    volumes:
      - mongodb_data:/data/db
    networks:
      - wasteless-network

  # Redis (for BullMQ job queue)
  redis:
    image: redis:7-alpine
    container_name: wasteless-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wasteless-network

  # MailHog (Mock SMTP server for development)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: wasteless-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - wasteless-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wasteless-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/wasteless
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      CLIENT_URL: http://localhost:5173
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
      - mailhog
    networks:
      - wasteless-network
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wasteless-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - wasteless-network
    command: npm run dev -- --host

volumes:
  mongodb_data:
  redis_data:

networks:
  wasteless-network:
    driver: bridge
